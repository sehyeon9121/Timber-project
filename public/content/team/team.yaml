# Terrer Lab Team Members

# Principal Investigator
- id: "Lee Seung-jae"
  name: "Lee Seung-jae"
  position: "Professor, Korea University of Technology and Education"
  bio: "Professor Seung-Jae Lee received his M.S. and Ph.D. in Architectural Engineering from the University of Tokyo, specializing in structural engineering. His research focuses on earthquake-resistant structures and AI-based structural design to enhance the safety and performance of buildings. He has actively contributed to academia and industry through award-winning research and practical applications in structural engineering."
  image: "images/cesar-terrer.jpg"
  scholar_url: "https://www.koreatech.ac.kr/faculty/view.es?mid=b30103010100&division=1&classification=DEPF006&seq=144"
  email: "leeseung@koreatech.ac.kr"

# Research Scientists
- id: "Lee Donwoo"
  name: "Lee Donwoo"
  position: "Postdoctoral Researcher"
  bio: "He conducts research in structural optimization, dynamic analysis, and seismic design, with particular emphasis on quantum-based algorithms, meta-heuristics, and machine learning for optimal structural systems. His work spans truss, dome, and large-scale timber structures, focusing on form-finding, topology optimization, vibration control (TMD), and advanced building hardware, supported by multiple national research projects funded by the NRF and KAIA."
  image: "images/evan-fricke.png"
  scholar_url: "https://sites.google.com/view/leedonwoo/people"
  email: "lov1004ely@koreatech.ac.kr"

