# Research Scientists
- id: "Lee Donwoo"
  name: "Lee Donwoo"
  position: "Postdoctoral Researcher"
  bio: "He conducts research in structural optimization, dynamic analysis, and seismic design, with particular emphasis on quantum-based algorithms, meta-heuristics, and machine learning for optimal structural systems. His work spans truss, dome, and large-scale timber structures, focusing on form-finding, topology optimization, vibration control (TMD), and advanced building hardware, supported by multiple national research projects funded by the NRF and KAIA."
  image: "images/evan-fricke.png"
  scholar_url: "https://sites.google.com/view/leedonwoo/people"
  email: "lov1004ely@koreatech.ac.kr"

