# 현재 팀원 목록
# ACT Institute Team Members

# ===== 1세부 =====
- id: "Lee Seung-jae"
  name:
    ko: "오정권"
    en: "Lee Seung-jae"
  position:
    ko: "교수, 한국기술교육대학교"
    en: "Professor, Korea University of Technology and Education"
  bio:
    ko: "이승재 교수는 도쿄대학교에서 건축공학 석사 및 박사 학위를 취득하였으며, 구조공학을 전공하였다. 내진 구조물과 AI 기반 구조 설계를 연구하며 건물의 안전성과 성능 향상에 기여하고 있다. 수상 경력이 있는 연구와 구조공학 분야의 실무 적용을 통해 학계와 산업계에 활발히 공헌하고 있다."
    en: "Professor Seung-Jae Lee received his M.S. and Ph.D. in Architectural Engineering from the University of Tokyo, specializing in structural engineering. His research focuses on earthquake-resistant structures and AI-based structural design to enhance the safety and performance of buildings. He has actively contributed to academia and industry through award-winning research and practical applications in structural engineering."
